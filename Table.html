<!DOCTYPE html>
<html>
    <head>
       <title>Lists</title>
    </head>
    <body>
        <h2>An order html list</h2>
        <ol>
            <li>First item</li>
            <li>Second item</li>
            <li>third item</li>
            <li>fourth item</li>
        </ol>
        <h2>An under html list</h2>
        <ul>
            <li>Itme</li>
            <li>Itme</li>
            <li>Itme</li>
            <li>Itme</li>
        </ul>
        <h2>Definition list:</h2>
        <Dl>
            <DT>tea</DT>
            <DD>Hot drink</DD>

            <dt>Juc</dt>
            <dd></dd>
        </Dl>
    </body
</html>
